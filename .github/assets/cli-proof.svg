<svg xmlns="http://www.w3.org/2000/svg" width="980" height="520" viewBox="0 0 980 520" role="img" aria-labelledby="title desc">
  <title id="title">agent-time-ledger CLI proof</title>
  <desc id="desc">A terminal-style visual showing atl commands for current time, sessions, marks, stale checks, and reports.</desc>
  <rect width="980" height="520" fill="#101418"/>
  <rect x="34" y="28" width="912" height="464" rx="8" fill="#151b21" stroke="#2d3944"/>
  <circle cx="62" cy="54" r="6" fill="#ff5f57"/>
  <circle cx="84" cy="54" r="6" fill="#ffbd2e"/>
  <circle cx="106" cy="54" r="6" fill="#28c840"/>
  <text x="132" y="60" fill="#95a3b3" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="15">atl local ledger demo</text>
  <text x="58" y="104" fill="#7ee787" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="17">$ atl now --json</text>
  <text x="78" y="132" fill="#c9d1d9" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="16">{ "timestamp": "2026-06-19T06:39:35Z", "confidence": "host_clock" }</text>
  <text x="58" y="176" fill="#7ee787" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="17">$ atl session start --name build</text>
  <text x="78" y="204" fill="#c9d1d9" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="16">started session sess_20260619T063935Z (build)</text>
  <text x="58" y="248" fill="#7ee787" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="17">$ atl mark check ci --json</text>
  <text x="78" y="276" fill="#c9d1d9" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="16">{ "name": "ci", "elapsed_human": "2h 4m 12s", "confidence": "wall_clock_fallback" }</text>
  <text x="58" y="320" fill="#7ee787" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="17">$ atl stale --mark ci --ttl 30m --json</text>
  <text x="78" y="348" fill="#c9d1d9" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="16">{ "stale": true, "elapsed_human": "2h 4m 12s" }</text>
  <text x="58" y="392" fill="#7ee787" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="17">$ atl report today</text>
  <text x="78" y="420" fill="#c9d1d9" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="16">report 2026-06-19: 5 events, 0 open marks, active_session=false</text>
  <rect x="58" y="448" width="864" height="1" fill="#2d3944"/>
  <text x="58" y="474" fill="#8b949e" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="14">Local-only state: state.json, events.jsonl, config.toml</text>
</svg>
