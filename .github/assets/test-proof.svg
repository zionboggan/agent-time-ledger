<svg xmlns="http://www.w3.org/2000/svg" width="980" height="360" viewBox="0 0 980 360" role="img" aria-labelledby="title desc">
  <title id="title">agent-time-ledger test proof</title>
  <desc id="desc">A terminal-style visual showing go test, go vet, build, CLI smoke, and MCP smoke checks passing.</desc>
  <rect width="980" height="360" fill="#0f1720"/>
  <rect x="34" y="28" width="912" height="304" rx="8" fill="#151b21" stroke="#2d3944"/>
  <circle cx="62" cy="54" r="6" fill="#ff5f57"/>
  <circle cx="84" cy="54" r="6" fill="#ffbd2e"/>
  <circle cx="106" cy="54" r="6" fill="#28c840"/>
  <text x="132" y="60" fill="#95a3b3" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="15">verification</text>
  <text x="58" y="108" fill="#7ee787" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="18">$ go test ./...</text>
  <text x="78" y="138" fill="#c9d1d9" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="16">ok   internal/clock    duration and RFC3339 checks</text>
  <text x="78" y="164" fill="#c9d1d9" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="16">ok   internal/ledger   sessions, marks, stale checks, JSONL persistence</text>
  <text x="58" y="210" fill="#7ee787" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="18">$ go vet ./...</text>
  <text x="78" y="240" fill="#c9d1d9" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="16">clean</text>
  <text x="58" y="286" fill="#7ee787" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="18">$ atl serve-mcp</text>
  <text x="78" y="316" fill="#c9d1d9" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="16">tools/list and time_now returned valid JSON-RPC responses</text>
</svg>
